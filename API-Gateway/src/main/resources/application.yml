server:
  port: 8082

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: ASSIGNMENTOFFICE
          uri: lb://AssignmentOffice
          predicates:
            - Path=/taskassignment/**
          
        - id: spbootpro
          uri: lb://SPBootPro
          predicates:
            - Path=/contra/**  

eureka:
  instance:
    prefer-ip-address: true

  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka
