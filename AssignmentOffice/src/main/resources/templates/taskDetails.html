<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Details | Velocis</title>

    <link href="/viewTask.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>


<!-- Sidebar -->
  <aside class="sidebar">
      <div class="sidebar-header">
          <img src="/images/velocis-logo.png" class="logo" />
      </div>

      <ul class="menu">
          <li><a th:href="@{/taskassignment/assignTask}"><i class="bi bi-plus-circle"></i> Create Task</a></li>
          <li><a th:href="@{/taskassignment/developer}"><i class="bi bi-person-plus"></i> Add Developer</a></li>
          <li><a th:href="@{/taskassignment/project}"><i class="bi bi-folder-plus"></i> Add Project</a></li>
          <li class="active"><a th:href="@{/taskassignment/assignedTask}"><i class="bi bi-list-task"></i> All Tasks</a></li>
		  <li><a href="@{/taskassignment/myProfile}"><i class="bi bi-person-circle"></i> My Profile</a></li>
          <li><a href="#"><i class="bi bi-bar-chart"></i> Reports</a></li>
      </ul>

      <div class="footer">© 2025 Velocis Systems Pvt. Ltd.</div>
  </aside>

<!-- Main Content -->
<div class="main-content" th:each="task : ${taskDetails}">

    <!-- Page Title -->
    <div class="title-bar">
        <h2 th:text="'Task Details - ' + (task.taskTitle != null ? task.taskTitle : 'N/A')"></h2>
    </div>

    <!-- Task Overview -->
    <div class="task-overview">
        <div class="overview-card">
            <h4>Open Since</h4>

            <!-- Timer display -->
            <p class="timer" id="openSinceTimer"
               th:data-created-epoch="${createdOnEpoch != null ? createdOnEpoch : 0}">
               0 hrs 0 min
            </p>

            <span class="status open">Open</span>
        </div>

        <div class="details-card">
            <p class="label"><b>Task Description</b></p>
            <p th:text="${task.taskDetails != null ? task.taskDetails : 'N/A'}"></p>
        </div>
    </div>

    <!-- Information + Action Section -->
    <div class="info-section">

        <!-- Left Info -->
        <div class="info-box">

            <p><strong>Project Name:</strong>
                <span th:text="${task.project != null && task.project.projectName != null ? task.project.projectName : 'N/A'}"></span>
            </p>

            <p><strong>Due Date:</strong>
                <span th:text="${task.dueDate != null ? task.dueDate : 'N/A'}"></span>
            </p>

            <p><strong>Created On:</strong>
                <span th:text="${task.createdOn != null ? #temporals.format(task.createdOn, 'dd-MM-yyyy HH:mm:ss') : 'N/A'}"></span>
            </p>

            <p><strong>Created By:</strong>
                <span th:text="${task.createdBy != null ? task.createdBy : 'N/A'}"></span>
            </p>

            <p><strong>Status:</strong>
                <span class="badge status"
                      th:classappend="${task.status == 0 ? ' pending' :
                                       task.status == 1 ? ' in-progress' :
                                       task.status == 2 ? ' completed' : ' pending'}"
                      th:text="${task.status == 0 ? 'Pending' :
                               task.status == 1 ? 'In Progress' :
                               task.status == 2 ? 'Completed' : 'Pending'}">
                </span>
            </p>

            <p><strong>Priority:</strong>
                <span th:text="${task.priority != null ? task.priority : 'N/A'}"></span>
            </p>
        </div>

        <!-- Right Action Card -->
        <div class="action-card">

            <h4>Task Actions</h4>

            <form th:action="@{/taskassignment/saveData}" method="post" enctype="multipart/form-data">

                <input type="hidden" name="id" th:value="${task.id != null ? task.id : 0}" />

                <!-- Action -->
                <div class="form-group">
                    <label>Your Action</label>
                    <input type="text" id="action" name="action" placeholder="Your action item..." required />
                    <small class="error" id="actionError"></small>
                </div>

                <!-- Status -->
                <div class="form-group">
                    <label>Status *</label>
                    <select name="status" id="status" required>
                        <option value="">Select Status</option>
                        <option value="0">Pending</option>
                        <option value="1">In Progress</option>
                        <option value="2">Completed</option>
                    </select>
                    <small class="error" id="statusError"></small>
                </div>

                <!-- File Upload -->
                <div class="form-group">
                    <label>Upload File</label>
                    <input type="file" id="document" name="document" />
                    <small class="error" id="fileError"></small>
                </div>

                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>

<script>
(function() {
  const timerEl = document.getElementById('openSinceTimer');
  if (!timerEl) return;

  // read epoch millis set by server (string) and coerce to number
  const createdEpoch = Number(timerEl.dataset.createdEpoch);

  if (!createdEpoch || isNaN(createdEpoch)) {
    timerEl.textContent = '—'; // or some fallback
    return;
  }

  function formatDiff(ms) {
    if (ms < 0) ms = 0;
    const sec = Math.floor(ms / 1000) % 60;
    const mins = Math.floor(ms / (60 * 1000)) % 60;
    const hours = Math.floor(ms / (60 * 60 * 1000)) % 24;
    const days = Math.floor(ms / (24 * 60 * 60 * 1000));

    if (days > 0) {
      return `${days}d ${hours}h ${mins}m ${sec}s`;
    } else if (hours > 0) {
      return `${hours}h ${mins}m ${sec}s`;
    } else if (mins > 0) {
      return `${mins}m ${sec}s`;
    } else {
      return `${sec}s`;
    }
  }

  function tick() {
    const diff = Date.now() - createdEpoch;
    timerEl.textContent = formatDiff(diff);
  }

  tick(); // initial render
  setInterval(tick, 1000);
})();
</script>
