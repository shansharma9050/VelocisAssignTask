<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Success</title>
    <meta charset="UTF-8" />
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .card {
            margin-top: 100px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card text-center p-4">
                    <div class="card-body">
                        <h3 class="text-success" th:text="${message}">Registration Successful</h3>
                        <div class="mt-4">
                            <a href="/Contra/register" class="btn btn-outline-primary me-2">Back to Registration</a>
                            <a href="/login" class="btn btn-primary">Login</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
