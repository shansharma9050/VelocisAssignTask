<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Success - Velocis</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ------------------------------
           BACKGROUND (THEME MATCH)
        ------------------------------ */
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-image: url("/images/Image1.png");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.6);
            z-index: 0;
        }

        /* ------------------------------
           WRAPPER
        ------------------------------ */
        .success-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ------------------------------
           CARD
        ------------------------------ */
        .success-card {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            padding: 45px;
            border-radius: 16px;
            text-align: center;

            box-shadow: 0 10px 30px rgba(0,0,0,0.15);

            position: relative;
            z-index: 1;

            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ------------------------------
           ICON
        ------------------------------ */
        .success-icon {
            font-size: 55px;
            color: #16a34a;
            margin-bottom: 15px;
        }

        /* ------------------------------
           TEXT
        ------------------------------ */
        h3 {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }

        /* ------------------------------
           BUTTONS
        ------------------------------ */
        .btn-primary-custom {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-primary-custom:hover {
            box-shadow: 0 6px 15px rgba(37,99,235,0.3);
        }

        .btn-outline-custom {
            border: 1px solid #2563eb;
            color: #2563eb;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 500;
            background: transparent;
            transition: 0.3s;
        }

        .btn-outline-custom:hover {
            background: #2563eb;
            color: #fff;
        }

        /* ------------------------------
           MOBILE
        ------------------------------ */
        @media (max-width: 480px) {
            .success-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

<div class="success-wrapper">
    <div class="success-card">

        <!-- ICON -->
        <div class="success-icon">✔</div>

        <!-- TITLE -->
        <h3 th:text="${message}">Registration Successful</h3>

        <!-- MESSAGE -->
        <p class="subtitle">
            Your registration request has been submitted successfully.<br>
            Once approved by the admin, your login credentials will be sent to your registered email address.
        </p>

        <!-- BUTTONS -->
        <div class="mt-4">
            <a th:href="@{/act}" class="btn btn-outline-custom me-2">
                Back to Registration
            </a>

            <a th:href="@{/login}" class="btn btn-primary-custom">
                Login
            </a>
        </div>

    </div>
</div>

<!-- OPTIONAL AUTO REDIRECT -->
<!--<script>
    // Redirect to login after 5 seconds (optional)
    setTimeout(function () {
        window.location.href = "/login";
    }, 5000);
</script>-->

</body>
</html>
