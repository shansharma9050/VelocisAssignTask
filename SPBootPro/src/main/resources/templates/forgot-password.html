<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Forgot Password</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

	<style>
		body {
			background-image: url("../images/Image1.png");
			background-size: cover;
			background-repeat: no-repeat;
			background-position: center;
			height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}

		.forgot-card {
			width: 420px;
			border-radius: 16px;
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(10px);
			padding: 30px;
		}

		.forgot-title {
			font-weight: 600;
			color: #2c5364;
		}

		.form-control {
			height: 45px;
			border-radius: 8px;
		}

		.btn-reset {
			height: 45px;
			border-radius: 8px;
			font-weight: 600;
			background: linear-gradient(135deg, #2c5364, #203a43);
			border: none;
		}

		.btn-reset:hover {
			background: linear-gradient(135deg, #203a43, #2c5364);
		}

		.back-link {
			text-decoration: none;
			color: #2c5364;
			font-weight: 500;
		}

		.back-link:hover {
			text-decoration: underline;
		}
	</style>

</head>

<body>

	<div class="forgot-card shadow-lg">

		<h4 class="text-center forgot-title mb-3">
			Forgot Password
		</h4>

		<p class="text-center text-muted mb-4">
			Enter your registered email to reset password
		</p>

		<form method="get" th:action="@{/send-reset-password}">

			<div class="mb-3">
				<label class="form-label">Email Address</label>
				<input type="email" name="email" th:value="${email}" class="form-control" placeholder="Enter your email"
					required>
			</div>

			<button class="btn btn-primary btn-reset w-100">
				Send Reset Link
			</button>

			<div class="text-center mt-3">
				<a href="/login" class="back-link">
					← Back to Login
				</a>
			</div>

		</form>

	</div>

</body>

</html>
