<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Email Verification - Velocis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/verifyEmail.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="verification-wrapper">
    <div class="verification-card">
        <div class="logo-container">
            <img th:src="@{/images/velocis-logo.png}" alt="Velocis Logo" class="logo">
        </div>

        <h2>Email Verification</h2>
        <p class="subtitle">Please verify your email to continue securely.</p>

        <form id="otpForm" action="/auth/verify-otp" method="POST">
            <label for="emailId">Email Address</label>
            <input type="email" id="emailId" name="email" placeholder="Enter your email" required>

            <button type="button" class="btn-secondary" onclick="sendEmail()">Send OTP</button>

            <label for="otp">Enter OTP</label>
            <input type="text" id="otp" name="otp" placeholder="Enter OTP received" required>

            <button type="submit" class="btn-primary">Verify & Continue</button>

            <p class="message success" th:if="${message}" th:text="${message}"></p>
            <p class="message error" th:if="${error}" th:text="${error}"></p>
        </form>

        <div class="note">
            Didn’t receive the code? Check spam folder or click <strong>Send OTP</strong> again.
        </div>
    </div>
</div>

<!-- Loader Overlay -->
<div id="loaderOverlay">
	<div class="paraLoder">
    <div class="loader"></div>
    <p>Sending OTP...</p>
	</div>
</div>

<script>
    function sendEmail() {
        const email = document.getElementById("emailId").value;
        if (!email) {
            alert("Please enter a valid email first.");
            return;
        }

        // Show loader
        $("#loaderOverlay").fadeIn(200);

        $.ajax({
            url: '/auth/send-otp',
            type: 'POST',
            data: { email: email },
            dataType: 'text',
            success: function (response) {
                $("#loaderOverlay").fadeOut(200);
                alert(response);
            },
            error: function (xhr) {
                $("#loaderOverlay").fadeOut(200);
                alert("Error: " + xhr.responseText);
            }
        });
    }
</script>

</body>
</html>
