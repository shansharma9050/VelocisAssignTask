<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Email Verification - Velocis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="/verifyEmail.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="verification-wrapper">
<div class="verification-card">

<div class="logo-container">
<img th:src="@{/images/velocis-logo.png}" alt="Velocis Logo" class="logo">
</div>

<h2>Email Verification</h2>
<p class="subtitle">Please verify your email to continue securely.</p>

<form id="otpForm" action="/auth/verify-otp" method="POST">

<!-- EMAIL SECTION -->
<div id="sendOtpDivId">
<label>Email Address</label>

<input type="email"
       id="emailId"
       name="email"
       placeholder="Enter your email"
       required
       onblur="validateAndCheckEmail()">

<span id="emailStatusId"></span>

<button type="button"
        id="sendOtpBtn"
        class="btn-secondary"
        onclick="sendEmail()"
        disabled>
Send OTP
</button>

<input type="hidden" id="hiddenUserNameId" name="username">
</div>


<!-- OTP SECTION -->
<div id="verifyOtpDivId" style="display:none;">
<label>Enter OTP</label>

<input type="text"
       id="otp"
       name="otp"
       placeholder="Enter OTP received">

<button type="submit" class="btn-primary">
Verify & Continue
</button>

<!-- TIMER -->
<div id="otpTimerBox" style="display:none; margin-top:10px;">
    <span style='color:green' id="timerText"></span>

    <button type="button"
            id="resendBtn"
            onclick="resendOtp()"
            style="display:none"
            class="btn-secondary">
        Resend OTP
    </button>
</div>

</div>


<div class="form-footer">
<a th:href="@{/act}">Create an Account</a>
</div>

<!-- Social Buttons -->
<ul class="social-login">
<li>
<button type="button" class="social-btn">
<img src="https://id-frontend.prod-east.frontend.public.atl-paas.net/assets/google-logo.5867462c.svg">
Continue with Google
</button>
</li>

<li>
<button type="button" class="social-btn">
<img src="https://id-frontend.prod-east.frontend.public.atl-paas.net/assets/microsoft-logo.c73d8dca.svg">
Continue with Microsoft
</button>
</li>
</ul>

</form>
</div>
</div>

<script>

// EMAIL VALIDATION
function validateAndCheckEmail(){

    const email = $("#emailId").val().trim();
    const status = $("#emailStatusId");
    const otpBtn = $("#sendOtpBtn");

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    status.html("");

    if(email === ""){
        status.html("<span style='color:red'>Email required</span>");
        otpBtn.prop("disabled", true);
        return;
    }

    if(!emailRegex.test(email)){
        status.html("<span style='color:red'>Invalid Email Format ❌</span>");
        otpBtn.prop("disabled", true);
        return;
    }

    $.ajax({
        url:'/api/checkDuplicate',
        type:'POST',
        data:{email:email},
        dataType:'json',

        success:function(response){

            if(response.exist){

                status.html("<span style='color:green'>Registered Email ✔</span>");
                $("#hiddenUserNameId").val(response.username);
                otpBtn.prop("disabled", false);

            }else{

                status.html("<span style='color:red'>Email not registered ❌</span>");
                otpBtn.prop("disabled", true);
            }
        }
    });
}



// SEND OTP
function sendEmail(){

    const email = $("#emailId").val();

    if(!email){
        alert("Enter email first");
        return;
    }

    // disable button immediately
    $("#sendOtpBtn").prop("disabled", true);

    // show OTP UI immediately
    $("#verifyOtpDivId").slideDown();
    $("#sendOtpDivId").slideUp();

    // start timer immediately
    startTimer();

    $.ajax({

        url:'/auth/send-otp',
        type:'POST',
        data:{email:email},
        dataType:'text',

        success:function(response){

            $("#emailStatusId").html(
                "<span style='color:green'>" + response + "</span>"
            );
        },

        error:function(){

            alert("Error sending OTP");
            $("#sendOtpBtn").prop("disabled", false);
        }
    });
}



// TIMER
let countdown = null;
let timeLeft = 30;

function startTimer(){

    clearInterval(countdown);

    $("#otpTimerBox").show();
    $("#resendBtn").hide().prop("disabled", true);

    timeLeft = 30;

    $("#timerText").text("Resend OTP in 30s");

    countdown = setInterval(function(){

        timeLeft--;

        $("#timerText").text("Resend OTP in " + timeLeft + "s");

        if(timeLeft <= 0){

            clearInterval(countdown);

            $("#timerText").text("");
            $("#resendBtn").show().prop("disabled", false);
        }

    },1000);
}



// RESEND OTP
function resendOtp(){

    const email = $("#emailId").val();

    $("#resendBtn").prop("disabled", true);

    startTimer();

    $.ajax({

        url:'/auth/send-otp',
        type:'POST',
        data:{email:email},
        dataType:'text',

        success:function(){

            $("#emailStatusId").html(
                "<span style='color:green'>OTP Resent ✔</span>"
            );
        },

        error:function(){
            alert("Error sending OTP");
        }
    });
}

</script>

</body>
</html>
