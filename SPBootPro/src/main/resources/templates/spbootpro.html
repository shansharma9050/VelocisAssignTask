<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
	<meta charset="UTF-8">
	<title>User Registration - Velocis</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Custom CSS -->
	<link href="/registrationStyle.css" rel="stylesheet">
</head>

<body>

	<div class="register-wrapper">

		<div class="register-card">

			<!-- Logo -->
			<div class="logo-container text-center">
				<img th:src="@{/images/velocis-logo.png}" alt="Velocis Logo" class="logo">
			</div>

			<h2>Create Account</h2>
			<p class="subtitle">Join the Velocis platform securely.</p>

			<form th:action="@{/contra/register}" object="${spBootProModel}" autocomplete="off" method="post"
				onsubmit="return validateForm()">

				<div class="form-grid">

					<!-- Role -->
					<div>
						<label class="form-label">Role*</label>
						<select id="role" name="role" class="form-select" required>
							<option value="">-- Select Role --</option>
							<option value="User">User</option>
							<option value="Admin">Admin</option>
							<option value="Developer">Developer</option>
						</select>
					</div>

					<!-- Username -->
					<div>
						<label class="form-label">Username*</label>
						<input type="text" id="username" autocomplete="off" name="username" class="form-control"
							placeholder="Enter username" required>
					</div>

					<!-- Email -->
					<div>
						<label class="form-label">Email*</label>
						<input type="email" id="emailId" name="email" class="form-control" placeholder="Enter email"
							onblur="validateAndCheckEmail()" required>
							<span id="emailStatusId"></span>
					</div>

					<!-- Phone -->
					<div>
					<label class="form-label">Phone Number*</label>

					<div class="input-group">

					<select class="form-select" id="countryCode" name="countrycode" style="max-width:120px;">
					<option value="+91" selected>🇮🇳 +91</option>
					<option value="+1">🇺🇸 +1</option>
					<option value="+44">🇬🇧 +44</option>
					<option value="+971">🇦🇪 +971</option>
					<option value="+61">🇦🇺 +61</option>
					</select>

					<input type="tel"
					       id="phoneId"
					       name="phonenumber"
					       class="form-control"
					       placeholder="Enter mobile number"
					       maxlength="10"
					       pattern="[0-9]{10}"
					       oninput="this.value=this.value.replace(/[^0-9]/g,'')"
					       required>

					</div>

					<small class="text-muted">Enter 10 digit mobile number</small>

					</div>

					<!-- Employee Code -->
					<div class="full-width">
						<label class="form-label">Employee Code*</label>
						<input type="text" id="empCodeId" name="empcode" class="form-control"
							placeholder="Enter employee code" required>
					</div>

					<!-- Password -->
					<!--<div>
						<label class="form-label">Password*</label>
						<input type="password" id="password" autocomplete="on" name="password" class="form-control"
							placeholder="Enter password" required onkeyup="passwordCompare()" >
						<span id="passSpan"></span>
					</div>

					 Confirm Password 
					<div>
						<label class="form-label">Confirm Password*</label>
						<input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
							placeholder="Re-enter password" required onkeyup="passwordCompare()">
						<span id="confSpan"></span>
					</div>-->

				</div>

				<button type="submit" class="btn-register w-100 mt-4">
					Register
				</button>

				<!-- Messages -->
				<div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
				<div th:if="${message}" class="alert alert-success mt-3" th:text="${message}"></div>

			</form>

		</div>
	</div>

</body>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>

	function passwordCompare() {

		var pass1 = document.getElementById('password').value;
		var pass2 = document.getElementById('confirmPassword').value;
		var confSpan = document.getElementById('confSpan');

		if (pass2.length === 0) {
			confSpan.innerText = "";
			return;
		}

		if (pass1 !== pass2) {
			confSpan.innerText = "Passwords do not match!";
			confSpan.style.color = "red";
		} else {
			confSpan.innerText = "Password Match";
			confSpan.style.color = "green";
		}

	}

	function validateForm() {

		var pass1 = document.getElementById('password').value;
		var pass2 = document.getElementById('confirmPassword').value;

		if (pass1 !== pass2) {
			alert("Passwords do not match!");
			return false;
		}

		return true;

	}


	function validateAndCheckEmail() {

		const email = $("#emailId").val().trim();
		const status = $("#emailStatusId");

		const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

		status.html("");

		if (email === "") {
			status.html("<span style='color:red'>Email required</span>");
			return;
		}

		if (!emailRegex.test(email)) {
			status.html("<span style='color:red'>Invalid Email Format ❌</span>");
			return;
		}

		$.ajax({
			url: '/api/checkDuplicate',
			type: 'POST',
			contentType: "application/x-www-form-urlencoded",
			data: {email: email},
			dataType: 'json',

			success: function (response) {

				if (response.exist) {

					status.html("<span style='color:red'>Already registered email</span>");
					$("#emailId").val('');

				} else {

					status.html("<span style='color:green'>Email available ✔</span>");

				}
			},

			error: function () {

				status.html("<span style='color:red'>Error checking email</span>");

			}
		});
	}

</script>
</html>
