<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">
	<title>User Details | Velocis</title>

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

	<link rel="stylesheet" href="/registeredUser.css">

</head>

<body>


	<!-- TOP NAVBAR -->

	<div class="topbar">

		<div class="brand">
			<img src="/images/velocis-logo.png">
		</div>
	</div>
	<div class="page-header container-fluid" style="margin-left: 800px;">

	    <div class="d-flex justify-content-between align-items-center">

	        <h3 class="page-title">
	            <i class="bi bi-person-lines-fill"></i> User Details
	        </h3>

	        <a th:href="@{/contra/registereduser}" class="btn btn-outline-secondary btn-sm">
	            <i class="bi bi-arrow-left"></i> Back
	        </a>

	    </div>

	</div>


	<!-- MAIN CONTAINER -->

	<div class="container-fluid page-container">

		<div class="row justify-content-center">

			<div class="col-lg-8">

				<div class="card table-card shadow-sm">

					<div class="card-header">

						<h5>
							<i class="bi bi-person-lines-fill"></i>
							User Information
						</h5>

					</div>


					<div class="card-body">


						<!-- USER DETAILS -->

						<div class="row mb-3">

							<div class="col-md-6">
								<b>Username :</b>
								<span th:text="${user.username}"></span>
							</div>

							<div class="col-md-6">
								<b>Email :</b>
								<span th:text="${user.email}"></span>
							</div>
						</div>


						<div class="row mb-3">

							<div class="col-md-6">
								<b>Employee Code :</b>
								<span th:text="${user.empcode}"></span>
							</div>

							<div class="col-md-6">
								<b>Phone :</b>
								<span th:text="${user.phonenumber}"></span>
							</div>

						</div>


						<div class="row mb-3">
							<div class="col-md-6">
								<b>Role :</b>
								<span th:text="${user.role}"></span>
							</div>

						</div>

						<hr>


						<!-- APPROVAL FORM -->

						<form th:action="@{/contra/userAction}" method="post">

							<input type="hidden" name="id" th:value="${user.id}">
							
							<input type="hidden" name="email" th:value="${user.email}">

							<div class="mb-4">

								<label class="form-label"><b>Remark</b></label>

								<textarea class="form-control" name="remark" rows="3"
									placeholder="Enter remark"></textarea>

							</div>


							<div class="text-center">

								<button type="submit" name="action" value="approve" class="btn btn-success px-4">

									<i class="bi bi-check-circle"></i>
									Approve

								</button>


								<button type="submit" name="action" value="reject" class="btn btn-danger px-4 ms-3">

									<i class="bi bi-x-circle"></i>
									Reject

								</button>

								<a th:href="@{/registereduser}" class="btn btn-secondary px-4 ms-3">

									<i class="bi bi-arrow-left"></i>
									Back

								</a>

							</div>

						</form>


					</div>

				</div>

			</div>

		</div>

	</div>


</body>

</html>
